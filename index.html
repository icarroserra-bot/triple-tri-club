<script>
// ============================================================================
// UTILITY
// ============================================================================
function uid() { return crypto.randomUUID ? crypto.randomUUID() : 'id-' + Math.random().toString(36).substr(2,9) + Date.now().toString(36); }
function p(pct, ftp) { return Math.round((ftp||278) * pct); }
function formatPace(sec) { if(!sec||sec<=0) return '--:--'; const m=Math.floor(sec/60); const s=Math.round(sec%60); return `${m}:${s.toString().padStart(2,'0')}`; }
function parsePace(str) { const pts=str.split(':'); return pts.length===2 ? parseInt(pts[0])*60+parseInt(pts[1]) : null; }
function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

// ============================================================================
// INDEXEDDB AUDIO STORAGE
// ============================================================================
const AudioDB = {
  _db: null,
  DB_NAME: 'tripleTriAudio',
  DB_VERSION: 1,
  STORE_NAME: 'recordings',

  async open() {
    if (this._db) return this._db;
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this.DB_NAME, this.DB_VERSION);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(this.STORE_NAME)) {
          db.createObjectStore(this.STORE_NAME, { keyPath: 'id' });
        }
      };
      req.onsuccess = (e) => { this._db = e.target.result; resolve(this._db); };
      req.onerror = (e) => { console.error('AudioDB open error', e); reject(e); };
    });
  },

  async save(id, blob, transcription) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.STORE_NAME, 'readwrite');
      tx.objectStore(this.STORE_NAME).put({
        id,
        blob,
        transcription: transcription || '',
        date: new Date().toISOString(),
        size: blob.size
      });
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e);
    });
  },

  async get(id) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.STORE_NAME, 'readonly');
      const req = tx.objectStore(this.STORE_NAME).get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = (e) => reject(e);
    });
  },

  async delete(id) {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.STORE_NAME, 'readwrite');
      tx.objectStore(this.STORE_NAME).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e);
    });
  },

  async getAll() {
    const db = await this.open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.STORE_NAME, 'readonly');
      const req = tx.objectStore(this.STORE_NAME).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = (e) => reject(e);
    });
  },

  // Migrate old base64 audio from localStorage feedback into IndexedDB
  async migrateFromLocalStorage() {
    const feedback = Store.state.feedback || {};
    let migrated = 0;
    for (const [key, fb] of Object.entries(feedback)) {
      if (fb.audioData && fb.audioData.startsWith('data:')) {
        try {
          // Convert base64 data URL to blob
          const resp = await fetch(fb.audioData);
          const blob = await resp.blob();
          await this.save(key, blob, fb.audioTranscription || '');
          // Remove base64 from localStorage, keep reference
          fb.audioRef = key;
          fb.audioDate = fb.audioDate || new Date().toLocaleString();
          delete fb.audioData;
          migrated++;
        } catch (e) { console.warn('Migration failed for', key, e); }
      }
    }
    if (migrated > 0) { Store.save(); console.log(`Migrated ${migrated} audio recordings to IndexedDB`); }
  }
};

// ============================================================================
// SPEECH RECOGNITION (Transcription)
// ============================================================================
const Transcriber = {
  _recognition: null,
  _transcript: '',
  _isListening: false,

  isSupported() {
    return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  },

  start() {
    if (!this.isSupported()) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    this._recognition = new SR();
    this._recognition.continuous = true;
    this._recognition.interimResults = false;
    this._recognition.lang = 'en-US';
    this._transcript = '';
    this._isListening = true;

    this._recognition.onresult = (event) => {
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          this._transcript += (this._transcript ? ' ' : '') + event.results[i][0].transcript;
        }
      }
    };

    this._recognition.onerror = (e) => {
      console.warn('SpeechRecognition error:', e.error);
      this._isListening = false;
    };

    this._recognition.onend = () => {
      this._isListening = false;
    };

    try { this._recognition.start(); } catch (e) { console.warn('SR start failed', e); }
  },

  stop() {
    if (this._recognition && this._isListening) {
      try { this._recognition.stop(); } catch (e) {}
    }
    this._isListening = false;
    return this._transcript;
  },

  getTranscript() {
    return this._transcript;
  }
};

  {zone:4,name:'Threshold',minPct:0.91,maxPct:1.05,color:'#facc15'},
  {zone:5,name:'VO2max',minPct:1.06,maxPct:1.20,color:'#fb923c'},
  {zone:6,name:'Anaerobic',minPct:1.21,maxPct:1.50,color:'#f87171'},
  {zone:7,name:'Neuromuscular',minPct:1.51,maxPct:null,color:'#c084fc'},
];
function calcPowerZones(ftp){if(!ftp||ftp<=0)return[];return POWER_ZONE_DEFS.map(z=>({...z,minWatts:Math.round(ftp*z.minPct),maxWatts:z.maxPct?Math.round(ftp*z.maxPct):null}));}
const PACE_ZONE_DEFS=[
  {zone:1,name:'Easy / Recovery',minM:1.30,maxM:1.15,color:'#a1a1aa'},
  {zone:2,name:'Aerobic / Endurance',minM:1.14,maxM:1.06,color:'#38bdf8'},
  {zone:3,name:'Tempo',minM:1.05,maxM:0.99,color:'#34d399'},
  {zone:4,name:'Threshold',minM:0.98,maxM:0.94,color:'#facc15'},
  {zone:5,name:'VO2max / Speed',minM:0.93,maxM:0.85,color:'#f87171'},
];
function calcPaceZones(tp){if(!tp||tp<=0)return[];return PACE_ZONE_DEFS.map(z=>({...z,minPace:Math.round(tp*z.minM),maxPace:Math.round(tp*z.maxM)}));}
function calcCSS(t400,t200){if(!t400||!t200||t400<=t200)return null;return((t400-t200)/2);}
const SWIM_ZONE_DEFS=[
  {zone:1,name:'Recovery',offMin:0.20,offMax:0.12,color:'#a1a1aa'},
  {zone:2,name:'Endurance',offMin:0.11,offMax:0.05,color:'#38bdf8'},
  {zone:3,name:'Threshold',offMin:0.04,offMax:-0.02,color:'#34d399'},
  {zone:4,name:'VO2max',offMin:-0.03,offMax:-0.08,color:'#facc15'},
  {zone:5,name:'Sprint',offMin:-0.09,offMax:-0.15,color:'#f87171'},
];
function calcSwimZones(t400,t200){const css=calcCSS(t400,t200);if(!css)return[];return SWIM_ZONE_DEFS.map(z=>({...z,css,minPace:Math.round(css*(1+z.offMin)),maxPace:Math.round(css*(1+z.offMax))}));}

const STORE_VERSION = 6;
const Store = {
  _state:{_v:STORE_VERSION,athletes:[],activeAthleteId:null,plans:[],ui:{currentPage:'today'},chatMessages:[],apiKey:'',brickSel:{},trackSel:{},feedback:{},_recording:null,connectedServices:{},healthData:{},audioStore:{}},
  _listeners:[],
  init(){
    const saved=localStorage.getItem('trainforge:state');
    if(saved){
      try{
        const parsed=JSON.parse(saved);
        if(parsed._v!==STORE_VERSION){
          // Keep useful data across version upgrades
          this._state.apiKey=parsed.apiKey||'';
          this._state.chatMessages=parsed.chatMessages||[];
          if(parsed.athletes&&parsed.athletes.length>0){
            this._state.athletes=parsed.athletes;
            this._state.activeAthleteId=parsed.activeAthleteId;
            this._state.plans=parsed.plans||[];
            this._state.feedback=parsed.feedback||{};
            this._state.healthData=parsed.healthData||{};
            this._state.connectedServices=parsed.connectedServices||{};
            this._state.audioStore=parsed.audioStore||{};
          }
        } else {
          this._state={...this._state,...parsed};
        }
      }catch(e){/* corrupted — use defaults */}
    }
    // Do NOT auto-create athletes — show profile picker instead
    if(!this._state.activeAthleteId&&this._state.athletes.length>0) this._state.activeAthleteId=this._state.athletes[0].id;
    // Auto-recover: ensure every athlete has a plan
    this._state.athletes.forEach(a=>{
      if(!this._state.plans.find(p=>p.athleteId===a.id)){
        this._state.plans.push(generateCairnsPlan(a));
      }
    });
    if(!this._state.feedback) this._state.feedback={};
    if(!this._state.audioStore) this._state.audioStore={};
    if(!this._state.healthData) this._state.healthData={};
    this.save();
  },
  get state(){return this._state;},
  update(partial){Object.assign(this._state,typeof partial==='function'?partial(this._state):partial);this.save();this._listeners.forEach(fn=>fn(this._state));},
  subscribe(fn){this._listeners.push(fn);},
  save(){this._state._v=STORE_VERSION;localStorage.setItem('trainforge:state',JSON.stringify(this._state));},
  getActiveAthlete(){return this._state.athletes.find(a=>a.id===this._state.activeAthleteId)||this._state.athletes[0];},
  getActivePlan(){
    const a=this.getActiveAthlete();if(!a) return null;
    let plan=this._state.plans.find(p=>p.athleteId===a.id);
    if(!plan){plan=generateCairnsPlan(a);this._state.plans.push(plan);this.save();}
    return plan;
  },
  hasAthletes(){return this._state.athletes.length>0;}
};

// Finds all elements with data-audio-key and loads audio from IndexedDB into them
function loadAudioPlayers(){
  setTimeout(()=>{
    document.querySelectorAll('[data-audio-key]').forEach(async el=>{
      const key=el.dataset.audioKey;
      if(!key||el.dataset.loaded) return;
      el.dataset.loaded='1';
      try{
        const url=await getAudioUrl(key);
        if(url){
          const isModal=el.id.startsWith('audio-player-');
          const isInline=el.id.startsWith('inline-audio-');
          if(isModal) el.innerHTML=`<audio controls src="${url}" class="w-full h-10 mb-2"></audio>`;
          else if(isInline) el.innerHTML=`<audio controls src="${url}" class="h-8 w-full max-w-xs"></audio>`;
          else el.innerHTML=`<audio controls src="${url}" class="h-8 flex-1" style="max-width:300px"></audio>`;
        } else {
          el.innerHTML='';
        }
      }catch(e){ el.innerHTML=''; }
    });
  },50);
}

function wizardBack(){
  const step=Store.state._wizardStep||1;
  if(step<=1){Store.state._wizardStep=null;Store.state._wizardData=null;renderPage();return;}
  collectWizardData();
  Store.state._wizardStep=step-1;
  document.getElementById('main-content').innerHTML=renderWizard();
}

function wizardNext(){
  collectWizardData();
  const step=Store.state._wizardStep||1;
  // Validate step 1 name
  if(step===1&&!Store.state._wizardData.name){showToast('Please enter your name');return;}
  Store.state._wizardStep=step+1;
  document.getElementById('main-content').innerHTML=renderWizard();
}

function collectWizardData(){
  const ws=WIZARD_STEPS.find(s=>s.id===(Store.state._wizardStep||1));if(!ws)return;
  const data=Store.state._wizardData||{};
  ws.fields.forEach(f=>{
    if(f.type==='multiselect')return; // handled by toggleWizMulti
    const el=document.getElementById('wiz-'+f.key);
    if(el) data[f.key]=el.value;
  });
  Store.state._wizardData=data;
}

function toggleWizMulti(key,val){
  const data=Store.state._wizardData||{};
  let arr=(data[key]||'').split(',').filter(Boolean);
  if(arr.includes(val))arr=arr.filter(v=>v!==val);else arr.push(val);
  data[key]=arr.join(',');
  Store.state._wizardData=data;
  document.getElementById('main-content').innerHTML=renderWizard();
}

function wizardFinish(){
  collectWizardData();
  const d=Store.state._wizardData;if(!d||!d.name){showToast('Name is required');return;}

  const athlete={
    id:uid(), name:d.name, sport:(d.sport||'Triathlon').toLowerCase(),
    age:parseInt(d.age)||null, gender:d.gender||null, height:parseInt(d.height)||null,

    raceDate:d.raceDate||null, raceGoal:d.raceGoal||null,
    weeklyHours:d.weeklyHours||null, limiters:d.limiters||null,
    injuries:d.injuries||null, equipment:d.equipment||null, notes:d.notes||null,
    earlyMorning:d.earlyMorning||null, doubleDay:d.doubleDay||null,
    preferences:{
      longRide:d.longRide||'SAT', brick:d.brick||'SUN',
      longRun:d.brickIncludesLongRun==='Yes'?d.brick||'SUN':'SUN',

      hardSwim:(d.swimDays||'').split(',')[1]||'WED',

      ${week.flags?`<div class="mt-3 space-y-1">${week.flags.map(f=>`<div class="flex gap-2 text-xs text-zinc-500"><span style="color:${ac}">→</span><span>${f}</span></div>`).join('')}</div>`:''}

      ${week.days.map(day=>`

          <div class="px-4 py-2 bg-bg-tertiary border-b border-bg-border">

}

function renderSession(s,si,dayKey,wkId,ac){
  const tc=TAG_COLORS[s.tag]||TAG_COLORS.rest;
  const isKey=s.label&&(s.label.includes('★')||s.label.includes('PEAK')||s.label.includes('HARDEST'));
  const expKey=`${wkId}-${dayKey}-${si}`;
  const isOpen=Store.state.ui.expanded===expKey;

  // Brick with options
  if(s.isBrick && s.brickOpts){
    const selKey=`${wkId}-${dayKey}`;
    const selected=Store.state.brickSel[selKey];
    return `<div class="p-3 ${si>0?'border-t border-bg-border':''}">
      <div class="flex items-center gap-2 mb-2 flex-wrap">
        <span class="text-[10px] font-semibold px-2 py-0.5 rounded" style="background:${TAG_COLORS.bike.bg};color:${TAG_COLORS.bike.text};border:1px solid ${TAG_COLORS.bike.border}">Bike</span>
        <span class="text-[10px] font-semibold px-2 py-0.5 rounded" style="background:${TAG_COLORS.brick.bg};color:${TAG_COLORS.brick.text};border:1px solid ${TAG_COLORS.brick.border}">${s.label}</span>
        ${isKey?'<span class="text-[8px] font-bold px-1.5 py-0.5 rounded bg-yellow-500/10 text-yellow-400 border border-yellow-500/20">KEY</span>':''}

      ${s.brickOpts.map((opt,oi)=>{
        const active=selected===oi;
        const ic=opt.intensity==='hard'?'#e11d48':opt.intensity==='moderate'?'#f97316':'#00c9b1';
        return `<div onclick="selectBrick('${selKey}',${oi})" class="option-card rounded-lg p-3 mb-1.5" style="background:${active?ic+'10':'rgba(255,255,255,0.015)'};border:1px solid ${active?ic:'#141c26'}">
          <div class="flex justify-between items-center mb-1">
            <span class="text-xs font-semibold" style="color:${active?ic:'#64748b'}">${opt.label}</span>
            <span class="text-[9px] font-bold px-2 py-0.5 rounded uppercase tracking-wider" style="color:${ic};background:${ic}18">${opt.intensity}</span>
          </div>
          <div class="text-xs mono leading-relaxed" style="color:${active?'#94a3b8':'#374151'}">${opt.detail}</div>

      }).join('')}
      ${s.why?`<div onclick="toggleExpanded('${expKey}')" class="cursor-pointer mt-2">
        <span class="text-[9px] font-bold tracking-wider uppercase" style="color:${ac}">WHY ${isOpen?'▲':'▼'}</span>
        ${isOpen?`<div class="mt-2 p-3 rounded-lg text-xs text-zinc-400 leading-relaxed" style="background:rgba(255,255,255,0.02);border:1px solid ${ac}18">${s.why}</div>`:''}
      </div>`:''}
      <div class="mt-2 flex gap-1.5 flex-wrap">
        <button onclick="event.stopPropagation();openEditSession(${wkId},'${dayKey}',${si})" class="text-[10px] px-2.5 py-1 rounded bg-brand/10 text-brand-light border border-brand/20 hover:bg-brand/20 transition">Edit Session</button>
        <button onclick="event.stopPropagation();openFeedback('${expKey}')" class="text-[10px] px-2.5 py-1 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 hover:bg-emerald-500/20 transition">Add Feedback</button>
        <button onclick="event.stopPropagation();toggleRecording('${expKey}')" class="text-[10px] px-2.5 py-1 rounded ${Store.state._recording===expKey?'bg-red-500/20 text-red-400 border border-red-500/30 rec-pulse':'bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500/20'} transition">${Store.state._recording===expKey?'Stop Recording':'Record Audio'}</button>
      </div>
    </div>`;
  }

  // Track session
  if(s.trackKey){
    const opts=TRACK[s.trackKey];
    const tSelKey=`${wkId}-${dayKey}`;
    const tSelected=Store.state.trackSel[tSelKey];
    return `<div class="p-3 ${si>0?'border-t border-bg-border':''}">
      <div class="flex items-center gap-2 mb-2 flex-wrap">
        <span class="text-[10px] font-semibold px-2 py-0.5 rounded" style="background:${tc.bg};color:${tc.text};border:1px solid ${tc.border}">${s.label}</span>
      </div>
      <div class="text-xs mono text-zinc-600 leading-relaxed mb-3">${s.target}</div>
      ${opts?`
        <div class="text-[9px] font-bold tracking-widest uppercase mb-2" style="color:${ac}">CHOOSE YOUR MAIN SET (after warm-up)</div>
        ${opts.map((opt,i)=>{
          const active=tSelected===i;
          const pc=opt.pace.includes('Faster')?'#e11d48':opt.pace.includes('5K')?'#f97316':opt.pace.includes('HM')?'#00c9b1':'#fbbf24';
          return `<div onclick="selectTrack('${tSelKey}',${i})" class="option-card rounded-lg p-3 mb-1.5" style="background:${active?pc+'12':'rgba(255,255,255,0.02)'};border:1px solid ${active?pc:'#141c26'}">

      ${s.why?`<div onclick="toggleExpanded('${expKey}')" class="cursor-pointer mt-2"><span class="text-[9px] font-bold tracking-wider uppercase" style="color:${ac}">WHY ${isOpen?'▲':'▼'}</span>${isOpen?`<div class="mt-2 p-3 rounded-lg text-xs text-zinc-400 leading-relaxed" style="background:rgba(255,255,255,0.02);border:1px solid ${ac}18">${s.why}</div>`:''}</div>`:''}
      <div class="mt-2 flex gap-1.5 flex-wrap">
        <button onclick="event.stopPropagation();openEditSession(${wkId},'${dayKey}',${si})" class="text-[10px] px-2.5 py-1 rounded bg-brand/10 text-brand-light border border-brand/20 hover:bg-brand/20 transition">Edit Session</button>
        <button onclick="event.stopPropagation();openFeedback('${expKey}')" class="text-[10px] px-2.5 py-1 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 hover:bg-emerald-500/20 transition">Add Feedback</button>
        <button onclick="event.stopPropagation();toggleRecording('${expKey}')" class="text-[10px] px-2.5 py-1 rounded ${Store.state._recording===expKey?'bg-red-500/20 text-red-400 border border-red-500/30 rec-pulse':'bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500/20'} transition">${Store.state._recording===expKey?'Stop Recording':'Record Audio'}</button>
      </div>
    </div>`;
  }

  // Session feedback key
  const fbKey=`${wkId}-${dayKey}-${si}`;

  // Normal session
  return `<div class="sess p-3 ${si>0?'border-t border-bg-border':''}">
    <div onclick="toggleExpanded('${expKey}')" class="cursor-pointer">
      <div class="flex items-center gap-2 mb-1 flex-wrap">
        <span class="text-[10px] font-semibold px-2 py-0.5 rounded" style="background:${tc.bg};color:${tc.text};border:1px solid ${tc.border}">${s.label}</span>
        ${isKey?'<span class="text-[8px] font-bold px-1.5 py-0.5 rounded bg-yellow-500/10 text-yellow-400 border border-yellow-500/20">KEY</span>':''}
        ${s.tag==='test'?'<span class="text-[8px] font-bold px-1.5 py-0.5 rounded bg-orange-500/10 text-orange-400 border border-orange-500/20">ACTION</span>':''}
        ${hasAudio?'<span class="text-[8px] px-1.5 py-0.5 rounded bg-red-500/10 text-red-400 border border-red-500/20">AUDIO</span>':''}
        ${hasNote?'<span class="text-[8px] px-1.5 py-0.5 rounded bg-blue-500/10 text-blue-400 border border-blue-500/20">NOTE</span>':''}
        <span class="ml-auto text-zinc-700 text-xs">${isOpen?'▲':'▼'}</span>
      </div>
      <div class="text-xs mono text-zinc-600 leading-relaxed">${s.target}</div>
    </div>
    ${isOpen?`
      ${s.why?`<div class="mt-2 p-3 rounded-lg text-xs text-zinc-400 leading-relaxed" style="background:rgba(255,255,255,0.02);border:1px solid ${ac}18"><span class="font-bold text-[10px] tracking-wider uppercase" style="color:${ac}">WHY → </span>${s.why}</div>`:''}
      <div class="mt-2 flex gap-1.5 flex-wrap">
        <button onclick="event.stopPropagation();openEditSession(${wkId},'${dayKey}',${si})" class="text-[10px] px-2.5 py-1 rounded bg-brand/10 text-brand-light border border-brand/20 hover:bg-brand/20 transition">Edit Session</button>
        <button onclick="event.stopPropagation();openFeedback('${fbKey}')" class="text-[10px] px-2.5 py-1 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 hover:bg-emerald-500/20 transition">${hasNote||hasAudio?'View Feedback':'Add Feedback'}</button>
        <button onclick="event.stopPropagation();toggleRecording('${fbKey}')" class="text-[10px] px-2.5 py-1 rounded ${Store.state._recording===fbKey?'bg-red-500/20 text-red-400 border border-red-500/30 rec-pulse':'bg-red-500/10 text-red-400 border border-red-500/20 hover:bg-red-500/20'} transition">${Store.state._recording===fbKey?'Stop Recording':'Record Audio'}</button>
      </div>
      ${hasAudio?`<div id="plan-audio-${fbKey}" class="mt-2 flex items-center gap-2" data-audio-key="${fbKey}"><span class="text-[9px] text-zinc-600">Loading...</span></div>`:''}
      ${fb&&fb.audioTranscription?`<div class="mt-1 text-[10px] text-zinc-500 italic bg-bg-tertiary rounded px-2 py-1">"${escapeHtml(fb.audioTranscription)}"</div>`:''}
      ${hasNote?`<div class="mt-2 p-2 rounded text-xs text-zinc-400 italic" style="background:rgba(255,255,255,0.02)">"${escapeHtml(fb.note)}"</div>`:''}

function renderCalendar(){
  const plan=Store.getActivePlan();const a=Store.getActiveAthlete();
  if(!plan) return '<div class="p-8 text-zinc-400">No plan found.</div>';
  const calWeek=Store.state.ui.calendarWeek!=null?Store.state.ui.calendarWeek:0;
  const DAYS=['MON','TUE','WED','THU','FRI','SAT','SUN'];
  const DAYNAMES=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

  // Parse week start date for calendar headers
  function getWeekDates(week){
    if(!week.dates) return DAYNAMES.map((d,i)=>d);
    // dates format: "Mar 24–30" or "Apr 7–13"
    const months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const m=week.dates.match(/([A-Z][a-z]+)\s+(\d+)/);
    if(!m) return DAYNAMES;
    const month=months[m[1]]; const day=parseInt(m[2]); const year=2026;
    const start=new Date(year,month,day);
    return DAYNAMES.map((_,i)=>{
      const d=new Date(start);d.setDate(start.getDate()+i);
      return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    });
  }

  const week=plan.weeks[calWeek]||plan.weeks[0];
  const ac=PC[week.phase]||'#00c9b1';
  const dates=getWeekDates(week);

  // Build day→sessions map
  const dayMap={};
  DAYS.forEach(d=>dayMap[d]=[]);
  week.days.forEach(d=>{dayMap[d.day]=d.sessions||[];});

  // Find max sessions in any day for grid height
  const maxSess=Math.max(...Object.values(dayMap).map(s=>s.length),1);

  return `<div class="p-6 fade-in">
    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
      <div>
        <h2 class="text-2xl font-bold text-white">Calendar</h2>
        <p class="text-sm text-zinc-500">Week-by-week calendar grid — click any session for details</p>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="calNav(-1)" class="px-3 py-1.5 bg-bg-secondary border border-bg-border rounded hover:bg-bg-hover text-zinc-400 text-sm transition" ${calWeek<=0?'disabled style="opacity:0.3"':''}>← Prev</button>
        <span class="text-sm mono font-bold px-3" style="color:${ac}">${week.label} — ${week.name}</span>
        <button onclick="calNav(1)" class="px-3 py-1.5 bg-bg-secondary border border-bg-border rounded hover:bg-bg-hover text-zinc-400 text-sm transition" ${calWeek>=plan.weeks.length-1?'disabled style="opacity:0.3"':''}>Next →</button>
      </div>
    </div>

    <!-- Week pills -->
    <div class="flex gap-1 flex-wrap mb-4">
      ${plan.weeks.map((w,i)=>{const bc=PC[w.phase]||'#64748b';const active=i===calWeek;
        return `<button onclick="calGoTo(${i})" class="pill px-2.5 py-1 rounded text-[10px] font-bold" style="border:1px solid ${active?bc:'#141c26'};background:${active?bc+'18':'transparent'};color:${active?bc:'#374151'}">${w.label}</button>`;
      }).join('')}
    </div>

    <!-- Phase & volume bar -->
    <div class="rounded-lg p-3 mb-4 flex items-center justify-between flex-wrap gap-3" style="background:${ac}0a;border:1px solid ${ac}22">
      <div class="flex items-center gap-3 flex-wrap">
        <span class="text-[9px] font-bold tracking-widest uppercase" style="color:${ac}">${week.phase}</span>
        <span class="text-xs text-zinc-500">${week.dates}</span>
        <span class="text-xs mono" style="color:#2dd4bf">${week.hours}</span>
      </div>
      <div class="flex gap-3">
        ${[{l:'Swim',v:week.totals.swim,c:'#60a5fa'},{l:'Bike',v:week.totals.bike,c:'#fbbf24'},{l:'Run',v:week.totals.run,c:'#4ade80'}].map(t=>`<div class="text-center"><span class="text-sm font-bold" style="color:${t.c}">${t.v}</span><span class="text-[9px] text-zinc-600 ml-1">${t.l} km</span></div>`).join('')}
      </div>
    </div>

    <!-- Calendar grid -->
    <div class="grid grid-cols-7 gap-1.5">
      <!-- Day headers -->
      ${DAYS.map((d,i)=>`<div class="text-center pb-2"><div class="text-[10px] font-bold tracking-wider text-zinc-500 uppercase">${d}</div><div class="text-[10px] text-zinc-600">${dates[i]}</div></div>`).join('')}

      <!-- Day columns -->
      ${DAYS.map(d=>{
        const sessions=dayMap[d]||[];
        const isEmpty=sessions.length===0||sessions.every(s=>s.tag==='rest');
        return `<div class="bg-bg-secondary rounded-lg border border-bg-border min-h-[180px] p-1.5 flex flex-col gap-1 ${isEmpty?'opacity-60':''}">
          ${sessions.length===0?'<div class="flex-1 flex items-center justify-center text-[10px] text-zinc-700">Rest</div>':''}
          ${sessions.map((s,si)=>{
            const tc=TAG_COLORS[s.tag]||TAG_COLORS.rest;
            const isRest=s.tag==='rest';
            const expKey='cal-'+calWeek+'-'+d+'-'+si;
            const isOpen=Store.state.ui.calExpanded===expKey;
            return `<div onclick="toggleCalExpand('${expKey}')" class="rounded p-1.5 cursor-pointer hover:brightness-110 transition" style="background:${tc.bg};border:1px solid ${tc.border}">
              <div class="flex items-center gap-1">
                <span class="text-[8px] font-bold uppercase tracking-wider" style="color:${tc.text}">${s.tag}</span>
                ${s.label&&(s.label.includes('★')||s.label.includes('PEAK')||s.label.includes('HARDEST'))?'<span class="text-[7px] text-yellow-400">★</span>':''}
                ${s.tag==='test'?'<span class="text-[7px] text-orange-400">⚡</span>':''}
              </div>
              <div class="text-[10px] text-zinc-300 leading-tight mt-0.5 line-clamp-2">${isRest?'Rest Day':s.label||''}</div>
              ${isOpen?`<div class="mt-1.5 pt-1.5 border-t" style="border-color:${tc.border}">
                <div class="text-[9px] mono text-zinc-400 leading-relaxed">${s.target||''}</div>
                ${s.why?`<div class="text-[9px] text-zinc-500 mt-1 italic">${s.why}</div>`:''}
                ${s.trackKey?`<div class="text-[8px] font-bold mt-1" style="color:${ac}">Has track options — see Training Plan view</div>`:''}
                ${s.isBrick?`<div class="text-[8px] font-bold mt-1" style="color:${ac}">Has run options — see Training Plan view</div>`:''}
              </div>`:''}
            </div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>

    ${week.context?`<div class="mt-4 p-3 rounded-lg text-xs text-zinc-500 leading-relaxed" style="background:${ac}08;border:1px solid ${ac}15"><span class="font-bold uppercase tracking-wider text-[9px]" style="color:${ac}">WEEK CONTEXT → </span>${week.context}</div>`:''}
    ${week.flags?`<div class="mt-2 space-y-1">${week.flags.map(f=>`<div class="flex gap-2 text-xs text-zinc-500"><span style="color:${ac}">→</span><span>${f}</span></div>`).join('')}</div>`:''}
  </div>`;
}
function calNav(dir){
  const plan=Store.getActivePlan();if(!plan)return;
  const cur=Store.state.ui.calendarWeek||0;
  const next=Math.max(0,Math.min(plan.weeks.length-1,cur+dir));
  Store.state.ui.calendarWeek=next;Store.state.ui.calExpanded=null;Store.save();renderPage();
}
function calGoTo(idx){Store.state.ui.calendarWeek=idx;Store.state.ui.calExpanded=null;Store.save();renderPage();}
function toggleCalExpand(key){Store.state.ui.calExpanded=Store.state.ui.calExpanded===key?null:key;Store.save();renderPage();}

function togglePrefDay(key,day){

function saveProfile(id,isNew){
  const d={name:document.getElementById('pf-name').value||'Unnamed',sport:document.getElementById('pf-sport').value,ftp:parseInt(document.getElementById('pf-ftp').value)||null,weight:parseFloat(document.getElementById('pf-wt').value)||null,thresholdPace:parsePace(document.getElementById('pf-pace').value),css400:parseInt(document.getElementById('pf-css4').value)||null,css200:parseInt(document.getElementById('pf-css2').value)||null,updatedAt:new Date().toISOString()};
  if(isNew){
    const athlete={id:uid(),...d,preferences:{longRide:'SAT',brick:'SUN',trackDay:'TUE',hardBike:'THU',hardSwim:'WED',strengthA:'MON',strengthB:'WED',easySwim:'FRI',mobility:'FRI,SUN'},createdAt:new Date().toISOString()};
    Store.state.athletes.push(athlete);
    Store.state.plans.push(generateCairnsPlan(athlete));
    Store.update({activeAthleteId:athlete.id});
  } else {
    const idx=Store.state.athletes.findIndex(a=>a.id===id);
    if(idx>=0){
      const old=Store.state.athletes[idx];const oldFtp=old.ftp;Object.assign(old,d);
      if(d.ftp!==oldFtp){// Regenerate plan with new FTP
        const plans=Store.state.plans.filter(p=>p.athleteId!==id);
        plans.push(generateCairnsPlan(old));Store.state.plans=plans;
      }
    }
    Store.save();
  }
  closeModal();renderPage();updateAthleteSelect();showToast(isNew?'Athlete added!':'Profile updated!');
}

async function handleStravaCallback(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get('code');
  if(!code)return;
  // Clear URL params
  window.history.replaceState({},'',window.location.pathname);
  const cfg=Store.state.stravaConfig;
  if(!cfg||!cfg.clientId){showToast('Strava config missing');return;}
  try{
    const r=await fetch('https://www.strava.com/oauth/token',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({client_id:cfg.clientId,client_secret:cfg.clientSecret,code:code,grant_type:'authorization_code'})
    });
    const data=await r.json();
    if(data.access_token){
      const conn=Store.state.connectedServices||{};
      conn.strava={connected:true,lastSync:new Date().toLocaleString(),
        accessToken:data.access_token,refreshToken:data.refresh_token,
        expiresAt:data.expires_at,athlete:data.athlete};
      Store.update({connectedServices:conn});
      showToast('Strava connected! Welcome '+data.athlete?.firstname);
      renderPage();
    } else {
      showToast('Strava auth failed: '+(data.message||'Unknown error'));
    }
  }catch(e){showToast('Strava connection error: '+e.message);}
}

async function syncStrava(){
  const conn=Store.state.connectedServices||{};
  const strava=conn.strava;if(!strava||!strava.accessToken){showToast('Not connected to Strava');return;}
  // Check if token expired, refresh if needed
  if(strava.expiresAt&&strava.expiresAt*1000<Date.now()){
    const cfg=Store.state.stravaConfig;
    try{
      const r=await fetch('https://www.strava.com/oauth/token',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({client_id:cfg.clientId,client_secret:cfg.clientSecret,refresh_token:strava.refreshToken,grant_type:'refresh_token'})
      });
      const data=await r.json();
      if(data.access_token){strava.accessToken=data.access_token;strava.expiresAt=data.expires_at;strava.refreshToken=data.refresh_token;}
    }catch(e){showToast('Token refresh failed');return;}
  }
  // Fetch recent activities
  try{
    showToast('Syncing Strava activities...');
    const r=await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=30',{headers:{Authorization:'Bearer '+strava.accessToken}});
    const acts=await r.json();
    if(Array.isArray(acts)){
      if(!Store.state.stravaActivities) Store.state.stravaActivities=[];
      // Merge new activities
      const existingIds=new Set(Store.state.stravaActivities.map(a=>a.id));
      const newActs=acts.filter(a=>!existingIds.has(a.id));
      Store.state.stravaActivities=[...newActs,...Store.state.stravaActivities].slice(0,200);
      strava.lastSync=new Date().toLocaleString();
      Store.update({connectedServices:conn});
      renderPage();showToast('Synced '+acts.length+' activities from Strava!');
    } else {
      showToast('Strava API error: '+(acts.message||'Unknown'));
    }
  }catch(e){showToast('Sync error: '+e.message);}
}

function exportData(){
  const blob=new Blob([JSON.stringify({version:'3.0',exportedAt:new Date().toISOString(),state:Store.state},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`tripleTriClub-backup-${new Date().toISOString().split('T')[0]}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showToast('Data exported!');
}
function importData(event){
  const file=event.target.files[0];if(!file)return;const reader=new FileReader();
  reader.onload=function(e){try{const data=JSON.parse(e.target.result);if(data.state){Store._state={...Store._state,...data.state};Store.save();}renderPage();updateAthleteSelect();showToast('Data imported!');}catch(err){showToast('Invalid file');}};
  reader.readAsText(file);event.target.value='';
}

// ============================================================================
// TRAINING PLAN FILE PARSER (JSX / JSON / text)
// ============================================================================
function importPlanFile(event){
  const file=event.target.files[0];if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    try{
      let planData;
      if(ext==='json'){
        planData=JSON.parse(text);
        // If it's a full backup, import normally
        if(planData.state){importData(event);return;}
        // If it has weeks array directly
        if(planData.weeks){
          showPlanImportModal(planData);return;
        }
      }
      // JSX or text — parse the structure
      planData=parseJSXPlan(text);
      if(planData&&planData.weeks&&planData.weeks.length>0){
        showPlanImportModal(planData);
      } else {
        showToast('Could not parse plan file. Supported: .jsx (cairns-v5 format), .json');
      }
    }catch(err){
      console.error('Plan import error:',err);
      showToast('Error parsing file: '+err.message);
    }
  };
  reader.readAsText(file);event.target.value='';
}

function parseJSXPlan(text){
  // Extract FTP if present
  const ftpMatch=text.match(/const\s+FTP\s*=\s*(\d+)/);
  const ftp=ftpMatch?parseInt(ftpMatch[1]):0;

  // Extract race/plan info from comments
  const commentLines=text.split('\n').filter(l=>l.trim().startsWith('//'));
  let raceInfo='';
  for(const cl of commentLines){
    if(cl.includes('70.3')||cl.includes('Race')||cl.includes('World')||cl.includes('Ironman'))
      raceInfo=cl.replace(/\/\/\s*/,'').trim();
  }

  // First plan name from any week
  const nameMatch=text.match(/name:\s*"([^"]+)"/);
  const planName=raceInfo||nameMatch?nameMatch[1]:'Imported Plan';

  // Parse ALL week blocks — flexible regex that handles both with/without dates
  const weeks=[];
  // Match the opening of each week object: {  id:X, label:"WX",
  const weekStartRegex=/\{\s*\n?\s*id\s*:\s*(\d+)\s*,\s*label\s*:\s*"([^"]+)"\s*,\s*name\s*:\s*"([^"]+)"/g;
  let wm;
  while((wm=weekStartRegex.exec(text))!==null){
    const weekId=parseInt(wm[1]);
    const weekBlock=extractBlock(text,wm.index);

    // Extract optional fields flexibly
    const datesMatch=weekBlock.match(/dates\s*:\s*"([^"]+)"/);
    const phaseMatch=weekBlock.match(/phase\s*:\s*"([^"]+)"/);
    const hoursMatch=weekBlock.match(/hours\s*:\s*"([^"]+)"/);
    const totalsMatch=weekBlock.match(/totals\s*:\s*\{\s*swim\s*:\s*([\d.]+)\s*,\s*bike\s*:\s*([\d.]+)\s*,\s*run\s*:\s*([\d.]+)/);
    const contextMatch=weekBlock.match(/context\s*:\s*"([^"]+)"/);
    const flagsMatch=weekBlock.match(/flags\s*:\s*\[([^\]]+)\]/);
    let flags=[];
    if(flagsMatch){flags=flagsMatch[1].match(/"([^"]+)"/g)?.map(f=>f.replace(/"/g,''))||[];}

    const days=parseDays(weekBlock,ftp);

    weeks.push({
      id:weekId,
      label:wm[2],
      name:wm[3],
      dates:datesMatch?datesMatch[1]:'',
      phase:phaseMatch?phaseMatch[1]:'foundation',
      hours:hoursMatch?hoursMatch[1]:'',
      context:contextMatch?contextMatch[1]:'',
      flags:flags,
      totals:totalsMatch?{swim:parseFloat(totalsMatch[1]),bike:parseFloat(totalsMatch[2]),run:parseFloat(totalsMatch[3])}:{swim:0,bike:0,run:0},
      days:days
    });
  }

  // Extract athlete name from filename-style comments
  let athleteName='';
  const bnMatch=text.match(/BRENDON|IGNACIO|[A-Z]{3,}'S\s+RACE/i);
  if(bnMatch) athleteName=bnMatch[0].replace(/'S\s+RACE/i,'');

  return {planName,ftp,weeks,athleteName};
}

function extractBlock(text,startIdx){
  let depth=0;let start=-1;
  for(let i=startIdx;i<text.length;i++){
    if(text[i]==='{'){if(start===-1)start=i;depth++;}
    if(text[i]==='}'){depth--;if(depth===0)return text.substring(start,i+1);}
  }
  return text.substring(startIdx,startIdx+5000);
}

function parseDays(block,ftp){
  const days=[];
  const dayRegex=/\{day:"([A-Z]+)"\s*,\s*sessions:\s*\[/g;
  let dm;
  while((dm=dayRegex.exec(block))!==null){
    const sessBlock=extractArrayBlock(block,dm.index+dm[0].length-1);
    const sessions=parseSessions(sessBlock,ftp);
    days.push({day:dm[1],sessions});
  }
  return days;
}

function extractArrayBlock(text,startIdx){
  let depth=0;
  for(let i=startIdx;i<text.length;i++){
    if(text[i]==='[')depth++;
    if(text[i]===']'){depth--;if(depth===0)return text.substring(startIdx,i+1);}
  }
  return text.substring(startIdx,startIdx+2000);
}

function parseSessions(block,ftp){
  const sessions=[];
  const sessRegex=/\{tag:"([^"]+)"\s*,\s*label:"([^"]+)"\s*,/g;
  let sm;
  while((sm=sessRegex.exec(block))!==null){
    const sessStr=extractBlock(block,sm.index);
    // Extract target — handle backticks, double-quotes with escaped quotes inside
    let target='';
    const btMatch=sessStr.match(/target:\s*`([^`]*)`/);
    if(btMatch){target=btMatch[1];}
    else{
      const tIdx=sessStr.indexOf('target:');
      if(tIdx!==-1){
        const afterT=sessStr.substring(tIdx+7).trim();
        if(afterT[0]==='"'){
          // Extract string handling escaped quotes
          let i=1;let s='';
          while(i<afterT.length){
            if(afterT[i]==='\\'&&i+1<afterT.length){s+=afterT[i+1];i+=2;}
            else if(afterT[i]==='"'){break;}
            else{s+=afterT[i];i++;}
          }
          target=s;
        }
      }
    }
    // Extract why
    let why='';
    const wIdx=sessStr.indexOf('why:');
    if(wIdx!==-1){
      const afterW=sessStr.substring(wIdx+4).trim();
      if(afterW[0]==='"'){
        let i=1;let s='';
        while(i<afterW.length){
          if(afterW[i]==='\\'&&i+1<afterW.length){s+=afterW[i+1];i+=2;}
          else if(afterW[i]==='"'){break;}
          else{s+=afterW[i];i++;}
        }
        why=s;
      }
    }
    // Resolve template literals: ${p(0.XX)} → actual watts
    if(ftp>0) target=target.replace(/\$\{p\(([\d.]+)\)\}/g,(_,pct)=>Math.round(ftp*parseFloat(pct)));

    const trackMatch=sessStr.match(/trackKey:\s*"([^"]+)"/);
    const isBrickMatch=sessStr.match(/isBrick\s*:\s*true/);
    const sess={tag:sm[1],label:sm[2],target:target,why:why};
    if(trackMatch)sess.trackKey=trackMatch[1];
    if(isBrickMatch){
      sess.isBrick=true;
      sess.brickOpts=parseBrickOpts(sessStr);
    }
    sessions.push(sess);
  }
  return sessions;
}

function parseBrickOpts(block){
  const opts=[];
  const optRegex=/\{label:"([^"]+)"\s*,\s*intensity:"([^"]+)"\s*,\s*detail:\s*(?:`([^`]*)`|"([^"]*)")/g;
  let om;
  while((om=optRegex.exec(block))!==null){
    opts.push({label:om[1],intensity:om[2],detail:om[3]||om[4]||''});
  }
  return opts.length?opts:undefined;
}

async function deleteFeedbackAudio(fbKey){
  if(!confirm('Delete this recording?'))return;
  if(Store.state.feedback&&Store.state.feedback[fbKey]){
    // Delete from IndexedDB
    if(Store.state.feedback[fbKey].audioRef){
      try{ await AudioDB.delete(Store.state.feedback[fbKey].audioRef); }catch(e){}
    }
    delete Store.state.feedback[fbKey].audioData;
    delete Store.state.feedback[fbKey].audioRef;
    delete Store.state.feedback[fbKey].audioDate;
    delete Store.state.feedback[fbKey].audioTranscription;
    delete Store.state.feedback[fbKey].audioUrl;
    Store.save();
  }
  openFeedback(fbKey);showToast('Recording deleted.');
}

async function toggleRecording(fbKey){
  if(Store.state._recording===fbKey){
    // Stop recording
    if(_mediaRecorder&&_mediaRecorder.state==='recording') _mediaRecorder.stop();
    // Stop transcription
    const transcript = Transcriber.stop();
    return;
  }
  // Start recording
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    _audioChunks=[];
    _mediaRecorder=new MediaRecorder(stream);
    _mediaRecorder.ondataavailable=e=>{if(e.data.size>0)_audioChunks.push(e.data);};
    _mediaRecorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(_audioChunks,{type:'audio/webm'});
      const transcript = Transcriber.stop();

      // Save to IndexedDB
      try{
        await AudioDB.save(fbKey, blob, transcript);
      }catch(e){
        console.warn('IndexedDB save failed, falling back to localStorage',e);
      }

      if(!Store.state.feedback) Store.state.feedback={};
      if(!Store.state.feedback[fbKey]) Store.state.feedback[fbKey]={};
      Store.state.feedback[fbKey].audioRef=fbKey;
      Store.state.feedback[fbKey].audioDate=new Date().toLocaleString();
      Store.state.feedback[fbKey].audioTranscription=transcript||'';
      // Keep a small data URL fallback for immediate playback
      const url=URL.createObjectURL(blob);
      Store.state.feedback[fbKey].audioUrl=url;
      Store.state._recording=null;
      Store.save();renderPage();
      showToast(transcript?'Audio saved & transcribed!':'Audio saved!');
    };
    // Start speech recognition alongside recording
    Transcriber.start();
    _mediaRecorder.start();
    Store.state._recording=fbKey;
    renderPage();showToast('Recording... speak now. Click again to stop.');
  }catch(err){
    showToast('Microphone access denied. Please allow microphone in browser settings.');
  }
}

async function toggleRecordingInModal(fbKey){

}

// Load audio from IndexedDB and return an object URL for playback
async function getAudioUrl(fbKey){
  const fb=Store.state.feedback&&Store.state.feedback[fbKey];
  // If there's already a cached object URL, use it
  if(fb&&fb.audioUrl) return fb.audioUrl;
  // If there's old base64 data, use it directly
  if(fb&&fb.audioData) return fb.audioData;
  // Try IndexedDB
  try{
    const rec=await AudioDB.get(fb&&fb.audioRef||fbKey);
    if(rec&&rec.blob){
      const url=URL.createObjectURL(rec.blob);
      if(fb) fb.audioUrl=url; // cache it
      return url;
    }
  }catch(e){}
  return null;
}

// ============================================================================
// INIT
// ============================================================================
async function init(){
  Store.init();updateAthleteSelect();
  // Handle Strava OAuth callback
  if(window.location.search.includes('code=')){handleStravaCallback();}
  navigate('today');
  // Register service worker for offline/PWA support
  if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
  // Initialize IndexedDB and migrate old audio
  try{
    await AudioDB.open();
    await AudioDB.migrateFromLocalStorage();
  }catch(e){console.warn('AudioDB init:',e);}
  // Add mobile top padding
  const mc=document.getElementById('main-content');
  if(window.innerWidth<=768&&mc)mc.style.paddingTop='56px';
  window.addEventListener('resize',()=>{
    if(mc)mc.style.paddingTop=window.innerWidth<=768?'56px':'0';
  });
}

async function forceRefresh(){
  // Unregister service workers and clear all caches
  if('serviceWorker' in navigator){
    const regs=await navigator.serviceWorker.getRegistrations();
    for(const r of regs) await r.unregister();
  }
  const keys=await caches.keys();
  for(const k of keys) await caches.delete(k);
  window.location.reload(true);
}

init();
</script>
